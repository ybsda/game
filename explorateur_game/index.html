<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Le Petit Explorateur - Jungle Adventure</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="assets/relic.png">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="score-container">
                <img src="assets/relic.png" alt="Relique" class="score-icon">
                <span id="score">0</span>
            </div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>Le Petit Explorateur</h1>
            <p class="subtitle">Aventure dans la Jungle</p>
            
            <div class="character-selection-title">CHOISIS TON AVENTURIER</div>
            <div class="character-container">
                <div class="character-card active" id="card-hanaa" data-char="hanaa">
                    <div class="card-glow"></div>
                    <div class="char-img-container">
                        <img src="assets/character.png" alt="Hanaa">
                    </div>
                    <h3>Hanaa</h3>
                    <p class="char-desc">L'exploratrice agile</p>
                </div>
                <div class="character-card" id="card-chaimaa" data-char="chaimaa">
                    <div class="card-glow"></div>
                    <div class="char-img-container">
                        <img src="assets/chaimaa.png" alt="Chaimaa">
                    </div>
                    <h3>Chaimaa</h3>
                    <p class="char-desc">La chercheuse intrépide</p>
                </div>
            </div>
            
            <button id="start-button">COMMENCER</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1>FIN DE PARTIE</h1>
            <p>Score Final: <span id="final-score">0</span></p>
            <div class="game-over-buttons">
                <button id="restart-button">RECOMMENCER</button>
                <button id="menu-button" class="btn-secondary">PERSONNAGE</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
